<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Luna is a personal astrology app.">
    <title>Luna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="home-page">
    <header class="site-header" aria-label="Site header">
      <div class="wrap header-inner">
        <a class="brand-mark" href="index.html" aria-label="Luna home">Luna</a>
        <a class="button primary" href="#get-the-app">
          <span>Get the app</span>
          <span aria-hidden="true">Get the app</span>
        </a>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="wrap hero-inner">
          <h1 id="hero-title" class="hero-logo">Luna</h1>
          <p class="hero-subtitle">Personal astrology for clearer days.</p>
          <a id="get-the-app" class="button primary hero-button" href="#" aria-label="Get the Luna app">
            <span>Get the app</span>
            <span aria-hidden="true">Get the app</span>
          </a>

          <figure class="device-frame device-frame--iphone hero-device" aria-label="Luna app preview">
            <div class="device-frame__screen">
              <img src="assets/hero-app-screenshot.png" alt="Luna app screenshot">
            </div>
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
