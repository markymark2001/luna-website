<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Luna is a personal astrology app.">
    <title>Luna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="home-page">
    <header class="site-header" aria-label="Site header">
      <div class="wrap header-inner">
        <a class="brand-mark" href="index.html" aria-label="TAIA home">
          <span class="brand-logo brand-logo--header" aria-hidden="true"></span>
        </a>
        <a class="button primary" href="#get-the-app">
          <span>Download app <svg class="button-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M181.66 133.66l-80 80a8 8 0 0 1-11.32-11.32L164.69 128 90.34 53.66a8 8 0 0 1 11.32-11.32l80 80a8 8 0 0 1 0 11.32z"/></svg></span>
          <span aria-hidden="true">Download app <svg class="button-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M181.66 133.66l-80 80a8 8 0 0 1-11.32-11.32L164.69 128 90.34 53.66a8 8 0 0 1 11.32-11.32l80 80a8 8 0 0 1 0 11.32z"/></svg></span>
        </a>
      </div>
    </header>

    <section class="video-hero" aria-labelledby="video-hero-title">
      <video class="video-hero__media" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
        <source src="assets/homepage-background.mp4" type="video/mp4">
      </video>
      <div class="video-hero__overlay" aria-hidden="true"></div>

      <div class="wrap video-hero__content">
        <div class="video-hero__top">
          <h1 id="video-hero-title" class="hero-logo hero-logo--mark" aria-label="TAIA">
            <span class="brand-logo brand-logo--hero-top" aria-hidden="true"></span>
          </h1>
        </div>
        <div class="video-hero__bottom">
          <p class="hero-subtitle">Personal astrology for clearer days.</p>
          <div class="hero-rating" aria-label="Rated 4.8 stars, with more than 12 thousand readings a week">
            <span class="hero-rating__stars" aria-hidden="true">★★★★★</span>
            <span>4.8</span>
            <span class="hero-rating__dot" aria-hidden="true"></span>
            <span>12k+ readings a week</span>
          </div>
          <a class="button primary hero-button" href="#get-the-app" aria-label="Chat with Taia">
            <span>Chat with Taia <svg class="button-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M181.66 133.66l-80 80a8 8 0 0 1-11.32-11.32L164.69 128 90.34 53.66a8 8 0 0 1 11.32-11.32l80 80a8 8 0 0 1 0 11.32z"/></svg></span>
            <span aria-hidden="true">Chat with Taia <svg class="button-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M181.66 133.66l-80 80a8 8 0 0 1-11.32-11.32L164.69 128 90.34 53.66a8 8 0 0 1 11.32-11.32l80 80a8 8 0 0 1 0 11.32z"/></svg></span>
          </a>
        </div>
      </div>
    </section>

    <main>
      <section class="what-is" id="what-it-is" aria-labelledby="what-it-is-title">
        <div class="wrap what-is__inner">
          <p class="section-kicker">What it is</p>
          <div class="pillar-grid">
            <figure class="pillar-card">
              <img src="assets/pillar-astrology.svg" alt="Abstract astrology chart with orbit lines and stars">
              <figcaption>
                <h2 id="what-it-is-title">Astrology</h2>
                <p>Chart-aware guidance that connects the moment to your personal sky.</p>
              </figcaption>
            </figure>
            <figure class="pillar-card">
              <img src="assets/pillar-manifestation.svg" alt="Glowing path rising through a field of stars">
              <figcaption>
                <h2>Manifestation</h2>
                <p>Daily prompts that turn intention into something concrete to act on.</p>
              </figcaption>
            </figure>
            <figure class="pillar-card">
              <img src="assets/pillar-life-advice.svg" alt="Abstract conversation scene with moon and guiding lines">
              <figcaption>
                <h2>Life advice</h2>
                <p>Clear next steps for decisions, relationships, work, and change.</p>
              </figcaption>
            </figure>
          </div>
        </div>
      </section>

      <section class="hero" aria-labelledby="hero-title">
        <div class="wrap hero-inner">
          <h1 id="hero-title" class="hero-logo hero-logo--mark" aria-label="TAIA">
            <span class="brand-logo brand-logo--hero" aria-hidden="true"></span>
          </h1>
          <p class="hero-subtitle">Personal astrology for clearer days.</p>
          <a id="get-the-app" class="button primary hero-button" href="#" aria-label="Chat with Taia">
            <span>Chat with Taia <svg class="button-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M181.66 133.66l-80 80a8 8 0 0 1-11.32-11.32L164.69 128 90.34 53.66a8 8 0 0 1 11.32-11.32l80 80a8 8 0 0 1 0 11.32z"/></svg></span>
            <span aria-hidden="true">Chat with Taia <svg class="button-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M181.66 133.66l-80 80a8 8 0 0 1-11.32-11.32L164.69 128 90.34 53.66a8 8 0 0 1 11.32-11.32l80 80a8 8 0 0 1 0 11.32z"/></svg></span>
          </a>

          <figure class="device-frame device-frame--iphone hero-device" aria-label="Luna app preview">
            <div class="device-frame__screen">
              <img src="assets/hero-app-screenshot.png" alt="Luna app screenshot">
            </div>
          </figure>
        </div>
      </section>
    </main>
    <script>
      const header = document.querySelector(".site-header");
      const heroCta = document.querySelector(".video-hero__bottom .button");
      const syncHeader = () => {
        const ctaHasScrolledOut = heroCta
          ? heroCta.getBoundingClientRect().bottom <= 0
          : window.scrollY > 24;
        header.classList.toggle("is-visible", ctaHasScrolledOut);
      };

      syncHeader();
      window.addEventListener("scroll", syncHeader, { passive: true });
    </script>
  </body>
</html>
