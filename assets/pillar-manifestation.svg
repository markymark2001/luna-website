<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Manifestation visual</title>
  <desc id="desc">A glowing path rising through a field of stars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25051f"/>
      <stop offset=".48" stop-color="#5a1626"/>
      <stop offset="1" stop-color="#150213"/>
    </linearGradient>
    <linearGradient id="path" x1="106" y1="340" x2="520" y2="78">
      <stop offset="0" stop-color="#fce4d2" stop-opacity=".12"/>
      <stop offset=".42" stop-color="#e4ad55"/>
      <stop offset="1" stop-color="#f21398" stop-opacity=".78"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <path d="M122 334c70-14 101-57 144-99 58-57 114-63 174-94 36-19 62-45 78-72" fill="none" stroke="url(#path)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M118 334c87 8 142-15 192-48 43-29 69-68 116-91 42-21 78-27 103-66" fill="none" stroke="#fce4d2" stroke-opacity=".18" stroke-width="2"/>
  <g fill="#e4ad55">
    <circle cx="154" cy="118" r="3"/>
    <circle cx="214" cy="88" r="5"/>
    <circle cx="468" cy="318" r="4"/>
    <circle cx="526" cy="214" r="3"/>
    <circle cx="356" cy="92" r="2"/>
  </g>
  <g fill="none" stroke="#fce4d2" stroke-width="2" stroke-linecap="round" opacity=".72">
    <path d="M520 78l26 7-20 18"/>
    <path d="M214 88h22m-11-11v22"/>
  </g>
</svg>
