<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Astrology visual</title>
  <desc id="desc">A warm abstract star chart with orbit lines and gold stars.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="72%">
      <stop offset="0" stop-color="#8b2a68"/>
      <stop offset="0.48" stop-color="#3f1236"/>
      <stop offset="1" stop-color="#150213"/>
    </radialGradient>
    <linearGradient id="orbit" x1="110" y1="72" x2="536" y2="346">
      <stop offset="0" stop-color="#fce4d2" stop-opacity=".12"/>
      <stop offset=".46" stop-color="#e4ad55" stop-opacity=".75"/>
      <stop offset="1" stop-color="#fce4d2" stop-opacity=".16"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <g fill="none" stroke="url(#orbit)" stroke-width="2">
    <ellipse cx="320" cy="210" rx="210" ry="84" transform="rotate(-17 320 210)"/>
    <ellipse cx="320" cy="210" rx="152" ry="152" opacity=".75"/>
    <ellipse cx="320" cy="210" rx="92" ry="226" transform="rotate(28 320 210)" opacity=".52"/>
  </g>
  <g fill="#e4ad55">
    <circle cx="214" cy="122" r="5"/>
    <circle cx="422" cy="96" r="4"/>
    <circle cx="492" cy="262" r="5"/>
    <circle cx="162" cy="276" r="3"/>
    <circle cx="324" cy="210" r="8"/>
  </g>
  <g stroke="#fce4d2" stroke-linecap="round" stroke-width="2" opacity=".75">
    <path d="M214 122h24m-12-12v24"/>
    <path d="M492 262h24m-12-12v24"/>
    <path d="M422 96h16m-8-8v16"/>
  </g>
</svg>
